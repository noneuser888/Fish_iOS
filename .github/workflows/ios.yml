name: Build iOS IPAs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_NAME: 星途
  WORKSPACE_NAME: 星途.xcworkspace
  SCHEME_NAME: 星途
  CONFIGURATION: Release

jobs:
  build:
    name: Build ${{ matrix.variant.id }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          # 第一套包：当前默认配置。
          - id: jinyu
            display_name: 金鱼
            bundle_id: com.jinyu718.jinyu
            app_icon: AppIcon
            base_url: http://api.jinyu718.com

          # 第二套包：按实际业务修改名称、包名、图标资源名和接口地址。
          - id: juzi
            display_name: 橘子
            bundle_id: com.qwer.juzi
            app_icon: AppIcon-Alt
            base_url: http://app.51juzi.xyz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IPA tools
        run: brew install ldid

      - name: Build archive
        env:
          VARIANT_ID: ${{ matrix.variant.id }}
          DISPLAY_NAME: ${{ matrix.variant.display_name }}
          BUNDLE_ID: ${{ matrix.variant.bundle_id }}
          APP_ICON: ${{ matrix.variant.app_icon }}
          BASE_URL: ${{ matrix.variant.base_url }}
        run: |
          set -euo pipefail

          mkdir -p build

          ARCHIVE_PATH="build/${VARIANT_ID}.xcarchive"
          BASE_URL_DEFINE="APP_BASE_URL=@\\\"${BASE_URL}\\\""

          xcodebuild clean archive \
            -workspace "${WORKSPACE_NAME}" \
            -scheme "${SCHEME_NAME}" \
            -configuration "${CONFIGURATION}" \
            -sdk iphoneos \
            -archivePath "${ARCHIVE_PATH}" \
            "APP_DISPLAY_NAME=${DISPLAY_NAME}" \
            "PRODUCT_BUNDLE_IDENTIFIER=${BUNDLE_ID}" \
            "ASSETCATALOG_COMPILER_APPICON_NAME=${APP_ICON}" \
            "GCC_PREPROCESSOR_DEFINITIONS=\$(inherited) ${BASE_URL_DEFINE}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        id: package
        env:
          VARIANT_ID: ${{ matrix.variant.id }}
          DISPLAY_NAME: ${{ matrix.variant.display_name }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then
            VERSION="$(date +'%Y%m%d%H%M')"
          fi

          ARCHIVE_PATH="build/${VARIANT_ID}.xcarchive"
          APP_PATH="$(find "${ARCHIVE_PATH}/Products/Applications" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No .app found in ${ARCHIVE_PATH}/Products/Applications" >&2
            exit 1
          fi

          PAYLOAD_DIR="build/${VARIANT_ID}-payload/Payload"
          IPA_DIR="build/ipa"
          IPA_NAME="${DISPLAY_NAME}-${VARIANT_ID}-${VERSION}-unsigned.ipa"
          IPA_PATH="${IPA_DIR}/${IPA_NAME}"

          rm -rf "build/${VARIANT_ID}-payload"
          mkdir -p "${PAYLOAD_DIR}" "${IPA_DIR}"

          ldid -S "${APP_PATH}"
          cp -R "${APP_PATH}" "${PAYLOAD_DIR}/"

          (cd "build/${VARIANT_ID}-payload" && zip -qry "../ipa/${IPA_NAME}" Payload)

          echo "ipa_path=${IPA_PATH}" >> "${GITHUB_OUTPUT}"
          echo "ipa_name=${IPA_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.id }}-ipa
          path: ${{ steps.package.outputs.ipa_path }}
          if-no-files-found: error

  release:
    name: Upload IPAs to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download IPA artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.ipa
